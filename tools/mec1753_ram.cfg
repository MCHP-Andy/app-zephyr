# 1. 介面驅動
# adapter driver jlink
# adapter driver cmsis-dap
transport select swd

# 2. 載入必要的支援腳本 (解決 swj_newdap 找不到的問題)
source [find target/swj-dp.tcl]
source [find mem_helper.tcl]

# 3. 定義變數
set CHIPNAME mec1753
set _CPUTAPID 0x2ba01477

# 4. 建立 TAP (使用了剛才 source 的 swj_newdap)
swj_newdap $CHIPNAME cpu -expected-id $_CPUTAPID

# 5. 建立 DAP (新版 OpenOCD 必須語法)
dap create $CHIPNAME.dap -chain-position $CHIPNAME.cpu

# 6. 建立 Target 並關聯 DAP
target create $CHIPNAME.cpu cortex_m -endian little -dap $CHIPNAME.dap

# 7. 配置 SRAM 工作區 (MEC1753 SRAM 區間)
$CHIPNAME.cpu configure -work-area-phys 0x00118000 -work-area-size 0x4000 -work-area-backup 0

# 8. 速度與重置配置
adapter speed 500
reset_config srst_only srst_nogate

# 9. 初始化事件
$CHIPNAME.cpu configure -event reset-init {
    echo "--- MEC1753 Target Halted ---"
    halt
}